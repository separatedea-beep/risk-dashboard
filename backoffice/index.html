<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Broker Back Office</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
</head>
<body>
  <div id="app">
    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">&#9670;</span>
          <span class="logo-text">BackOffice</span>
        </div>
        <button id="sidebar-toggle" class="sidebar-toggle" title="Toggle sidebar">&#9776;</button>
      </div>
      <div class="sidebar-nav" id="sidebar-nav"></div>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar">BO</div>
          <div class="user-details">
            <div class="user-name">Admin</div>
            <div class="user-role">Super Admin</div>
          </div>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main id="main" class="main">
      <!-- Header -->
      <header id="header" class="header">
        <div class="header-left">
          <h1 id="page-title" class="page-title">Dashboard</h1>
          <div class="breadcrumb" id="breadcrumb"></div>
        </div>
        <div class="header-right">
          <div class="header-clocks" id="header-clocks"></div>
          <div class="header-actions">
            <button class="btn-icon" id="btn-notifications" title="Notifications">
              <span class="icon">&#128276;</span>
              <span class="badge" id="notif-badge">3</span>
            </button>
            <button class="btn-icon" id="btn-bridge-status" title="Bridge Status">
              <span class="status-dot" id="bridge-dot"></span>
              <span>Bridge</span>
            </button>
          </div>
        </div>
      </header>

      <!-- Content Area -->
      <div id="content" class="content">
        <!-- Views injected here by router -->
        <div id="view-dashboard" class="view active"></div>
        <div id="view-accounts" class="view"></div>
        <div id="view-account-detail" class="view"></div>
        <div id="view-ib" class="view"></div>
        <div id="view-ib-detail" class="view"></div>
        <div id="view-deposits" class="view"></div>
        <div id="view-trades" class="view"></div>
        <div id="view-swaps" class="view"></div>
        <div id="view-corporate-actions" class="view"></div>
        <div id="view-disputes" class="view"></div>
        <div id="view-reconciliation" class="view"></div>
        <div id="view-pnl" class="view"></div>
        <div id="view-lp-margin-report" class="view"></div>
        <div id="view-ib-commissions" class="view"></div>
        <div id="view-monthly-accounts" class="view"></div>
        <div id="view-dealing-desk" class="view"></div>
        <div id="view-rerouting" class="view"></div>
        <div id="view-requotes" class="view"></div>
        <div id="view-news-risk" class="view"></div>
        <div id="view-stopout-review" class="view"></div>
        <div id="view-ruin-analysis" class="view"></div>
        <div id="view-lp-overview" class="view"></div>
        <div id="view-lp-margin" class="view"></div>
        <div id="view-lp-sessions" class="view"></div>
        <div id="view-symbols" class="view"></div>
        <div id="view-leverage" class="view"></div>
        <div id="view-trading-hours" class="view"></div>
        <div id="view-server-health" class="view"></div>
        <div id="view-emi" class="view"></div>
        <div id="view-lp-margin-calls" class="view"></div>
        <div id="view-gateway-recon" class="view"></div>
        <div id="view-ib-payouts" class="view"></div>
      </div>
    </main>
  </div>

  <!-- Modal Container -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal" class="modal">
      <div class="modal-header">
        <h2 id="modal-title"></h2>
        <button class="modal-close" onclick="BO.ui.closeModal()">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
      <div id="modal-footer" class="modal-footer"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1"></script>
  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/services/ruin.js"></script>
  <script src="js/services/bridge.js"></script>
  <script src="js/services/mock.js"></script>
  <script src="js/services/api.js"></script>
  <script src="js/ui/sidebar.js"></script>
  <script src="js/ui/header.js"></script>
  <script src="js/ui/modal.js"></script>
  <script src="js/ui/toast.js"></script>
  <script src="js/ui/table.js"></script>
  <script src="js/renderers/dashboard.js"></script>
  <script src="js/renderers/accounts.js"></script>
  <script src="js/renderers/ib.js"></script>
  <script src="js/renderers/deposits.js"></script>
  <script src="js/renderers/trades.js"></script>
  <script src="js/renderers/reconciliation.js"></script>
  <script src="js/renderers/reporting.js"></script>
  <script src="js/renderers/dealing-desk.js"></script>
  <script src="js/renderers/ruin.js"></script>
  <script src="js/renderers/lp.js"></script>
  <script src="js/renderers/platform.js"></script>
  <script src="js/renderers/finance.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
